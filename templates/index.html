<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Registration Form</title>
</head>
<body>

<center>
    <h1>University Registration Form</h1>
    <p>Please fill the form below to register.</p>
</center>

<hr>

<form action="/register" method="POST">

    <h2>Personal Details</h2>

    <label for="first_name">First Name:</label>
    <input type="text" id="first_name" name="first_name" required>

    <br><br>

    <label for="last_name">Last Name:</label>
    <input type="text" id="last_name" name="last_name" required>

    <br><br>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob">

    <br><br>

    <label>Gender:</label><br>

    <input type="radio" id="male" name="gender" value="Male" required>
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="Female">
    <label for="female">Female</label>

    <input type="radio" id="other" name="gender" value="Other">
    <label for="other">Other</label>

    <br><br>

    <label for="photo">Upload Photo:</label>
    <input type="file" id="photo" name="photo">

    <hr>

    <h2>Contact Information</h2>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <br><br>

    <label for="phone">Phone Number:</label>
    <input type="text" id="phone" name="phone">

    <br><br>

    <label for="address">Address:</label><br>
    <textarea id="address" name="address" rows="4" cols="40"></textarea>

    <hr>

    <h2>Academic Information</h2>

    <label for="course">Course:</label>
    <select id="course" name="course">
        <option value="CSE">CSE</option>
        <option value="AI/ML">AI/ML</option>
        <option value="CSE AI">CSE AI</option>
        <option value="EE">EE</option>
    </select>

    <br><br>

    <h3>Extracurricular Activities</h3>

    <input type="checkbox" id="music" name="interest" value="Music">
    <label for="music">Music</label>

    <br>

    <input type="checkbox" id="sports" name="interest" value="Sports">
    <label for="sports">Sports</label>

    <br>

    <input type="checkbox" id="technology" name="interest" value="Technology">
    <label for="technology">Technology</label>

    <br>

    <input type="checkbox" id="dance" name="interest" value="Dance">
    <label for="dance">Dance</label>

    <hr>

    <h2>Create Your Account</h2>

    <label for="password">Create Password:</label>
    <input type="password" id="password" name="password" required>

    <br><br>

    <label for="security_question">Security Question:</label>
    <input type="text" id="security_question" name="security_question">

    <br><br>

    <label for="security_answer">Security Answer:</label>
    <input type="text" id="security_answer" name="security_answer">

    <br><br>

    <input type="checkbox" id="terms" name="terms" required>
    <label for="terms">I agree to the Terms and Conditions</label>

    <br><br>

    <input type="submit" value="Register">
    <input type="reset" value="Clear Form">

</form>

</body>
</html>
